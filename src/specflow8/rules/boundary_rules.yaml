rules:
  - check_id: BOUNDARY_RULE_VIOLATION
    checker: boundary_violation
    stage: quality_gates
    severity_by_mode:
      advisory: info
      transition: warn
      strict: error
    message: "Boundary rule violation in {doc} (pattern: {pattern})."
    suggestion: "Move content to the correct document boundary and keep docs single-purpose."
    params:
      boundaries:
        - doc: README.md
          forbidden_patterns:
            - "\\|\\s*ADR-ID\\s*\\|"
            - "\\|\\s*ID\\s*\\|\\s*Feature\\s*\\|\\s*Title\\s*\\|"
        - doc: ARCHITECTURE.md
          forbidden_patterns:
            - "### Snapshot\\s*/\\s*快照"
        - doc: TASKS.md
          forbidden_patterns:
            - "\\|\\s*ADR-ID\\s*\\|"
